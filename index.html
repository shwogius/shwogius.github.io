<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Daily Focus Sync</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Focus Sync">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --bg: #f8fafc; --accent: #6366f1; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: #1e293b; 
            -webkit-tap-highlight-color: transparent; 
            padding-top: env(safe-area-inset-top); 
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .card-white { background-color: #ffffff; border-color: #f1f5f9; }
        .card-indigo { background-color: #eef2ff; border-color: #e0e7ff; }
        .card-rose { background-color: #fff1f2; border-color: #ffe4e6; }
        .card-amber { background-color: #fffbeb; border-color: #fef3c7; }
        .card-emerald { background-color: #ecfdf5; border-color: #d1fae5; }
        .card-slate { background-color: #f1f5f9; border-color: #e2e8f0; }

        .task-card { transition: all 0.3s ease; position: relative; overflow: hidden; }
        .strikethrough { text-decoration: line-through !important; opacity: 0.5; }
        .extreme-text { font-size: 2.25rem; line-height: 1.1; letter-spacing: -0.05em; font-weight: 800; }
        
        input[type="checkbox"] { appearance: none; width: 24px; height: 24px; border: 2px solid rgba(200, 200, 200, 0.4); border-radius: 6px; cursor: pointer; background: white; flex-shrink: 0; position: relative; }
        input[type="checkbox"]:checked { background-color: var(--accent); border-color: var(--accent); }
        input[type="checkbox"]:checked::after { content: "✓"; color: white; position: absolute; left: 5px; top: 0px; font-size: 14px; font-weight: bold; }
        
        .subtask-check { width: 18px !important; height: 18px !important; border-radius: 4px !important; }
        .subtask-check:checked::after { left: 4px !important; top: -1px !important; font-size: 11px !important; }
        .subtask-item { display: flex; align-items: center; gap: 8px; margin-top: 8px; padding-left: 36px; }

        .tag-pill { font-size: 10px; font-weight: 800; text-transform: uppercase; padding: 2px 8px; border-radius: 9999px; display: inline-flex; align-items: center; gap: 4px; background: rgba(0,0,0,0.05); color: #64748b; }
        .color-dot { width: 16px; height: 16px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
        
        #sync-status { font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .syncing { color: #6366f1; animation: pulse 1s infinite; }
        .synced { color: #10b981; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen pb-40 px-6 pt-12">
    <div class="max-w-md mx-auto">
        <header class="mb-10">
            <div class="flex justify-between items-start mb-2">
                <div>
                    <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">Focus</h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span id="date-display" class="text-slate-400 font-semibold text-xs uppercase tracking-wider"></span>
                        <span id="sync-status" class="synced">Connecting...</span>
                    </div>
                </div>
                <div id="percentage-label" class="text-indigo-600 font-black text-xl">0%</div>
            </div>
            <div class="bg-slate-200 h-2 rounded-full overflow-hidden mt-4">
                <div id="progress-bar" class="bg-indigo-600 h-full transition-all duration-1000 w-0"></div>
            </div>
        </header>

        <div id="main-list" class="space-y-12">
            <section id="sect-big">
                <div class="flex items-center gap-2 mb-4">
                    <span class="bg-indigo-600 text-white text-[10px] font-black px-2 py-0.5 rounded uppercase">Priority 1</span>
                </div>
                <div id="big-container"></div>
            </section>
            
            <section id="sect-medium">
                <h2 class="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-[0.2em]">Medium Focus</h2>
                <div id="medium-container" class="space-y-3"></div>
            </section>
            
            <section id="sect-small">
                <h2 class="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-[0.2em]">Quick Wins</h2>
                <div id="small-container" class="space-y-3"></div>
            </section>
        </div>
    </div>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-sm flex flex-col gap-2 z-50">
        <div class="bg-slate-900/95 backdrop-blur-xl rounded-3xl p-4 flex justify-around items-center border border-white/10 shadow-2xl">
            <button id="btn-reset" class="text-white text-[10px] font-black uppercase tracking-widest opacity-60 hover:opacity-100">Reset</button>
            <div class="h-4 w-px bg-white/10"></div>
            <button id="btn-sync" class="text-white text-[10px] font-black uppercase tracking-widest opacity-60 hover:opacity-100">Sync Info</button>
            <div class="h-4 w-px bg-white/10"></div>
            <button onclick="window.print()" class="text-white text-[10px] font-black uppercase tracking-widest opacity-60 hover:opacity-100">Print</button>
        </div>
        <div id="user-badge" class="text-center text-[9px] text-slate-400 font-mono tracking-tighter opacity-50">Connecting...</div>
    </div>

    <div id="sync-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-3xl p-8 w-full max-w-xs shadow-2xl">
            <h3 class="text-xl font-black mb-2">Sync Devices</h3>
            <p class="text-slate-500 text-xs mb-6">Use this ID to sync across desktop and mobile.</p>
            <div class="bg-slate-100 p-3 rounded-xl mb-6 flex justify-between items-center">
                <code id="display-uid" class="text-[10px] font-mono text-slate-600 truncate mr-2">...</code>
                <button id="btn-copy" class="text-indigo-600 font-black text-[10px] uppercase">Copy</button>
            </div>
            <button id="btn-close-modal" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl text-xs uppercase tracking-widest">Done</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuration
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'focus-pwa-v1';

        const COLORS = [
            { id: 'white', hex: '#ffffff' },
            { id: 'indigo', hex: '#eef2ff' },
            { id: 'rose', hex: '#fff1f2' },
            { id: 'amber', hex: '#fffbeb' },
            { id: 'emerald', hex: '#ecfdf5' },
            { id: 'slate', hex: '#f1f5f9' }
        ];

        let state = null;
        let unsubscribe = null;
        let debounceTimer = null;

        // Force explicit initialization
        async function startApp() {
            try {
                // Step 1: Handle Authentication first
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                // Step 2: Set up listener once auth is confirmed
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        document.getElementById('user-badge').innerText = `ID: ${user.uid}`;
                        document.getElementById('display-uid').innerText = user.uid;
                        setupDataListener(user.uid);
                    } else {
                        document.getElementById('sync-status').innerText = "• Auth required";
                    }
                });
            } catch (err) {
                console.error("Initialization failed:", err);
                document.getElementById('sync-status').innerText = "• Connection Failed";
                document.getElementById('user-badge').innerText = "Error: Please refresh";
            }
        }

        function setupDataListener(uid) {
            if (unsubscribe) unsubscribe();
            
            // Following Mandatory Rule 1: /artifacts/{appId}/users/{userId}/{collectionName}
            const docRef = doc(db, 'artifacts', appId, 'users', uid, 'data', 'daily_plan');
            
            unsubscribe = onSnapshot(docRef, (snap) => {
                if (snap.exists()) {
                    state = snap.data();
                    render();
                    setSyncStatus(false);
                } else {
                    state = getDefaultState();
                    persist(); // Create initial doc
                }
            }, (err) => {
                console.error("Firestore sync error:", err);
                document.getElementById('sync-status').innerText = "• Sync Error";
            });
        }

        function getDefaultState() {
            return {
                big: [{t: '', d: false, id: Math.random(), color: 'white', subs: [], tags: []}],
                medium: Array(3).fill().map(() => ({t: '', d: false, id: Math.random(), color: 'white', subs: [], tags: []})),
                small: Array(5).fill().map(() => ({t: '', d: false, id: Math.random(), color: 'white', subs: [], tags: []}))
            };
        }

        async function persist() {
            if (!auth.currentUser || !state) return;
            setSyncStatus(true);
            try {
                const docRef = doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'data', 'daily_plan');
                await setDoc(docRef, state);
                // Status is cleared by the onSnapshot listener when update cycles back
            } catch (err) {
                console.error("Save failed", err);
                document.getElementById('sync-status').innerText = "• Save Error";
            }
        }

        function setSyncStatus(syncing) {
            const el = document.getElementById('sync-status');
            if (syncing) {
                el.innerText = '• Syncing...';
                el.className = 'syncing';
            } else {
                el.innerText = '• Synced';
                el.className = 'synced';
            }
        }

        function render() {
            if (!state) return;
            document.getElementById('date-display').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
            
            ['big', 'medium', 'small'].forEach(key => {
                const container = document.getElementById(`${key}-container`);
                container.innerHTML = '';
                
                state[key].forEach((task, i) => {
                    const card = document.createElement('div');
                    card.className = `task-card p-6 rounded-3xl border shadow-sm mb-4 card-${task.color || 'white'}`;
                    
                    const subsHtml = (task.subs || []).map((sub, si) => `
                        <div class="subtask-item group/sub">
                            <input type="checkbox" class="subtask-check" ${sub.d ? 'checked' : ''} id="subcheck-${key}-${i}-${si}">
                            <input type="text" value="${sub.t}" placeholder="Add detail..." 
                                id="subtext-${key}-${i}-${si}"
                                class="flex-1 bg-transparent border-none focus:outline-none text-xs font-semibold ${sub.d ? 'strikethrough' : 'text-slate-600'}">
                            <button class="opacity-0 group-hover/sub:opacity-100 text-xs text-red-400" id="subdel-${key}-${i}-${si}">✕</button>
                        </div>
                    `).join('');

                    const tagsHtml = (task.tags || []).map((tag, ti) => `
                        <span class="tag-pill shadow-sm">
                            ${tag}
                            <button id="tagdel-${key}-${i}-${ti}" class="ml-1 opacity-40 hover:opacity-100">✕</button>
                        </span>
                    `).join('');

                    card.innerHTML = `
                        <div class="flex items-start gap-4">
                            <input type="checkbox" ${task.d ? 'checked' : ''} id="check-${key}-${i}">
                            <div class="flex-1">
                                <textarea id="text-${key}-${i}" 
                                    placeholder="Empty task..." 
                                    class="w-full bg-transparent border-none focus:outline-none resize-none font-bold ${key === 'big' ? 'extreme-text' : 'text-base'} ${task.d ? 'strikethrough' : ''}">${task.t}</textarea>
                                
                                <div id="subs-container-${key}-${i}">${subsHtml}</div>
                                <button class="mt-4 text-[10px] font-black uppercase text-indigo-600/60 hover:text-indigo-600" id="addsub-${key}-${i}">+ Subtask</button>
                            </div>
                        </div>

                        <div class="mt-6 pt-4 border-t border-black/5">
                            <div class="flex flex-wrap gap-2 items-center mb-4">
                                ${tagsHtml}
                                <input type="text" placeholder="+ Tag" id="taginput-${key}-${i}" 
                                    class="bg-transparent text-[10px] font-black uppercase w-14 focus:outline-none text-slate-400">
                            </div>
                            <div class="flex gap-2">
                                ${COLORS.map(c => `<div class="color-dot colordot-${key}-${i}" data-color="${c.id}" style="background-color: ${c.hex}; ${task.color === c.id ? 'border: 2px solid #6366f1' : ''}"></div>`).join('')}
                            </div>
                        </div>
                    `;
                    container.appendChild(card);

                    // --- Event Handlers ---
                    card.querySelector(`#check-${key}-${i}`).onchange = (e) => { task.d = e.target.checked; persist(); };
                    
                    const textArea = card.querySelector(`#text-${key}-${i}`);
                    textArea.oninput = (e) => { 
                        task.t = e.target.value; 
                        e.target.style.height = 'auto';
                        e.target.style.height = e.target.scrollHeight + 'px';
                        clearTimeout(debounceTimer);
                        debounceTimer = setTimeout(persist, 1000);
                    };

                    card.querySelector(`#addsub-${key}-${i}`).onclick = () => {
                        if (!task.subs) task.subs = [];
                        task.subs.push({ t: '', d: false });
                        persist();
                    };

                    card.querySelector(`#taginput-${key}-${i}`).onkeydown = (e) => {
                        if (e.key === 'Enter' && e.target.value) {
                            if (!task.tags) task.tags = [];
                            task.tags.push(e.target.value.trim().toLowerCase());
                            e.target.value = '';
                            persist();
                        }
                    };

                    (task.subs || []).forEach((sub, si) => {
                        card.querySelector(`#subcheck-${key}-${i}-${si}`).onchange = (e) => { sub.d = e.target.checked; persist(); };
                        card.querySelector(`#subtext-${key}-${i}-${si}`).oninput = (e) => { sub.t = e.target.value; clearTimeout(debounceTimer); debounceTimer = setTimeout(persist, 1000); };
                        card.querySelector(`#subdel-${key}-${i}-${si}`).onclick = () => { task.subs.splice(si, 1); persist(); };
                    });

                    (task.tags || []).forEach((_, ti) => {
                        card.querySelector(`#tagdel-${key}-${i}-${ti}`).onclick = () => { task.tags.splice(ti, 1); persist(); };
                    });

                    card.querySelectorAll(`.colordot-${key}-${i}`).forEach(dot => {
                        dot.onclick = () => { task.color = dot.dataset.color; persist(); };
                    });
                    
                    // Initial height adjustment
                    textArea.style.height = 'auto';
                    textArea.style.height = textArea.scrollHeight + 'px';
                });
            });
            updateProgress();
        }

        function updateProgress() {
            const all = [...state.big, ...state.medium, ...state.small].filter(t => t.t.trim());
            let tot = 0, done = 0;
            all.forEach(task => {
                tot++; if (task.d) done++;
                (task.subs || []).forEach(s => { tot += 0.5; if (s.d) done += 0.5; });
            });
            const p = tot ? Math.round((done / tot) * 100) : 0;
            document.getElementById('percentage-label').innerText = p + '%';
            document.getElementById('progress-bar').style.width = p + '%';
        }

        // Global UI Events
        document.getElementById('btn-reset').onclick = async () => {
            if(confirm("Clear all tasks?")) {
                state = getDefaultState();
                await persist();
            }
        };
        
        document.getElementById('btn-sync').onclick = () => document.getElementById('sync-modal').classList.remove('hidden');
        document.getElementById('btn-close-modal').onclick = () => document.getElementById('sync-modal').classList.add('hidden');
        document.getElementById('btn-copy').onclick = () => {
            const id = document.getElementById('display-uid').innerText;
            const el = document.createElement('textarea');
            el.value = id; document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el);
            alert("ID Copied!");
        };

        // Start the engine
        window.addEventListener('load', startApp);
    </script>
</body>
</html>
